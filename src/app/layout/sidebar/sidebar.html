<aside class="sidebar">
  <div class="sidebar__brand">COMEYCALLA</div>

  <nav class="sidebar__nav">
    @for (item of navItems; track item.path) {
      <a
        class="sidebar__link"
        [routerLink]="item.path"
        routerLinkActive="sidebar__link--active"
      >
        {{ item.label }}
      </a>
    }
  </nav>
</aside>
