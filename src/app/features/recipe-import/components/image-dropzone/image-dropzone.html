<div class="image-dropzone">
  <input
    #fileInput
    class="image-dropzone__input"
    type="file"
    [accept]="accept"
    [disabled]="disabled"
    (change)="onFileInputChange($event)"
  />

  <div
    class="image-dropzone__box"
    [ngClass]="{
      'image-dropzone__box--dragging': isDragging,
      'image-dropzone__box--has-file': !!selectedFile,
      'image-dropzone__box--disabled': disabled
    }"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
    (click)="openFilePicker(fileInput)"
  >
    @if (!previewUrl) {
      <div class="image-dropzone__content">
        <span class="material-symbols-outlined image-dropzone__icon">upload</span>

        <p class="image-dropzone__drop-text">Arrastra una imagen aquí o haz clic para seleccionar</p>

        <ui-button [icon]="'image'" (click)="$event.stopPropagation(); openFilePicker(fileInput)">Seleccionar imagen</ui-button>

      </div>
    } @else {
      <div class="image-dropzone__preview-wrapper">
        <img
          class="image-dropzone__preview"
          [src]="previewUrl!"
          [alt]="selectedFile?.name || 'Preview'"
        />

        <div class="image-dropzone__preview-footer">
          <span class="image-dropzone__filename">{{ selectedFile?.name }}</span>

          <button
            type="button"
            class="image-dropzone__remove"
            (click)="$event.stopPropagation(); removeFile()"
          >
            Eliminar
          </button>
        </div>
      </div>
    }
  </div>
</div>
