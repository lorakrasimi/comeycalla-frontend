<section class="import-review-page">
  <div class="import-review-page__card">
    <header class="import-review-page__header">
      <div class="import-review-page__review-header">
        <h3 class="import-review-page__review-title">Revisa tu receta</h3>
      </div>

      <ui-button
        [variant]="'outline'"
        [icon]="'restart_alt'"
        [size]="'sm'"
        (click)="onProcessAgain()"
      >
        Procesar otra vez
      </ui-button>
    </header>

    <form class="import-review-page__form" [formGroup]="form" (ngSubmit)="onSave()">
      <app-recipe-form
        [form]="form"
        [imageUrl]="importStore.previewUrl()"
        [allowImageUpload]="false"
      />

      <div class="import-review-page__actions">
        <ui-button
          type="button"
          [variant]="'outline'"
          [icon]="'arrow_back'"
          (click)="onBack()"
        >
          Volver
        </ui-button>

        <ui-button [icon]="'save'" type="submit">
          Guardar receta
        </ui-button>
      </div>
    </form>
  </div>
</section>
