<label class="shopping-item-row">
  <div class="shopping-item-row__left">
    <input
      type="checkbox"
      [checked]="item.checked"
      (change)="onToggle()"
    />

    <span
      class="shopping-item-row__name"
      [class.shopping-item-row__name--checked]="item.checked"
    >
      {{ item.name }}
    </span>
  </div>

  <span class="shopping-item-row__quantity">
    {{ item.quantity }}
  </span>
</label>
