<label class="shopping-item-row">
  <div class="shopping-item-row__left">
    <input
      type="checkbox"
      class="custom-checkbox"
      [checked]="item.checked"
      (change)="onToggle()"
    />

    <span
      class="custom-checkbox-label shopping-item-row__name"
      [class.shopping-item-row__name--checked]="item.checked"
    >
      {{ item.name }}
    </span>
  </div>

  <button
    class="shopping-item-row__remove-button"
    (click)="deleteItem()"
  >
    ×
  </button>
</label>
