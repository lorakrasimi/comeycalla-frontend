@if (plan(); as mealPlan) {
  <section class="meal-plan-result-page">
    <app-ui-page-header [title]="'Tu menú semanal'"></app-ui-page-header>

    <div class="meal-plan-result-page__actions">
      <ui-button
        type="button"
        [variant]="'outline'"
        [icon]="'autorenew'"
        (click)="regenerate()"
      >
        Regenerar menú completo
      </ui-button>

      <ui-button
        type="button"
        [variant]="'outline'"
        [icon]="'inventory_2'"
        (click)="savePlan()"
      >
        Guardar menú
      </ui-button>

      <ui-button
        type="button"
        [variant]="'primary'"
        [icon]="'shopping_cart'"
        (click)="goToShoppingList()"
      >
        Generar lista de la compra
      </ui-button>
    </div>

    <div class="meal-plan-result-page__grid">
      @for (day of mealPlan.days; track day.dayNumber) {
        <app-meal-day-column
          [day]="day"
          (replaceSlot)="onReplaceSlot($event)"
        />
      }
    </div>
  </section>
} @else {
  <section class="meal-plan-result-page meal-plan-result-page--empty">
    <app-ui-empty-state
      title="No hay menú generado"
      description="Primero crea un menú semanal para ver el resultado."
    ></app-ui-empty-state>

    <ui-button
      type="button"
      [variant]="'primary'"
      [routerLink]="['/meal-plan']"
    >
      Crear menú
    </ui-button>
  </section>
}
