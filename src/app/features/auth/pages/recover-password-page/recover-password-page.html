<app-auth-form
  title="Recuperar contraseña"
  subtitle="Introduce tu email y te enviaremos un enlace para restablecer tu contraseña"
  [showLogo]="false"
>
  <form [formGroup]="recoverForm" (ngSubmit)="submit()" novalidate>
    <div class="form-field">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" />
      @if (email.touched && email.invalid) {
        <small class="error-message">
          @if (email.errors?.['required']) {
            El email es obligatorio.
          }
          @if (email.errors?.['email']) {
            Introduce un email válido.
          }
        </small>
      }
    </div>

    @if (successMessage) {
      <div class="success-message">{{ successMessage }}</div>
    }

    <button class="auth-button" type="submit" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Enviando...' : 'Enviar enlace' }}
    </button>
    <a class="signing-link" routerLink="/login">
      Iniciar sesión
    </a>
  </form>
</app-auth-form>
