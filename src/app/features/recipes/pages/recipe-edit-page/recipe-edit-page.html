<section class="recipe-edit-page">
  @if (loading()) {
    <ui-loader></ui-loader>
  } @else {
    <app-recipe-form
      [form]="form"
      [imageUrl]="imageUrl()"
      [submitting]="submitting()"
      (submit)="onSubmit()"
      (cancel)="onCancel()"
      (imageSelected)="onImageSelected($event)"
      (imageRemoved)="onImageRemoved()"
    />
  }
</section>
