<section class="recipe-edit-page">
  @if (loading()) {
    <app-ui-loader></app-ui-loader>
  } @else {
    <app-recipe-form
      [form]="form"
      [imageUrl]="imageUrl()"
      [submitLabel]="'Guardar cambios'"
      [submitting]="submitting()"
      (submit)="onSubmit()"
      (cancel)="onCancel()"
      (imageSelected)="onImageSelected($event)"
      (imageRemoved)="onImageRemoved()"
    />
  }
</section>
