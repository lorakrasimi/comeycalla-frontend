<section class="recipes-list-page">
  <app-ui-page-header [title]="'Mis recetas'"></app-ui-page-header>
  <section class="recipes-list-page__filters">
    <app-recipe-filters
      (filtersChange)="onFiltersChange($event)"
    />
  </section>

  <section class="recipes-list-page__grid">
    @for (recipe of recipes(); track recipe.id) {
      <app-recipe-card
        [id]="recipe.id"
        [title]="recipe.title"
        [img]="recipe.img"
        [category]="recipe.category"
        [cookingTime]="recipe.cookingTime"
        [description]="recipe.description"
        [servings]="recipe.servings"
        [tags]="recipe.tags"
      />
    }
  </section>
  <div class="recipes-list-page__pagination">
    <ui-button
      [variant]="'ghost'"
      [icon]="'arrow_back'"
      (click)="prevPage()"
    >
      Anterior
    </ui-button>

    <span class="recipes-list-page__pagination-info">
    Página {{ page() + 1 }} / {{ totalPages() }}
  </span>

    <ui-button
      [variant]="'ghost'"
      [icon]="'arrow_forward'"
      (click)="nextPage()"
    >
      Siguiente
    </ui-button>
  </div>
</section>
